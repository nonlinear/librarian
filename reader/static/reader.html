<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{BOOK_TITLE}}</title>
  <meta name="robots" content="noindex,nofollow">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #fafafa; }
    #viewer { width: 100vw; height: 100vh; }
    /* Navigation edges — invisible, only hover hint */
    .edge {
      position: fixed; top: 0; bottom: 0; width: 15vw;
      cursor: pointer; z-index: 10;
    }
    .edge.left { left: 0; }
    .edge.right { right: 0; }
    .edge:hover { background: rgba(0,0,0,0.02); }
  </style>
</head>
<body>
  <div id="viewer"></div>
  <div class="edge left" id="prev"></div>
  <div class="edge right" id="next"></div>

  <script>
    const BOOK_ID = "{{BOOK_ID}}";
    const book = ePub("/books/" + BOOK_ID + ".epub", { openAs: "epub" });
    const rendition = book.renderTo("viewer", {
      width: "100%",
      height: "100%",
      spread: "none",
      flow: "paginated",
      allowScriptedContent: true
    });

    // Global typography — Akrobat Regular, left-aligned.
    rendition.themes.default({
      "@font-face": {
        "font-family": "'Akrobat'",
        "font-weight": "400",
        "font-style": "normal",
        "src": "url('" + window.location.origin + "/static/fonts/Akrobat-Regular.woff2') format('woff2')"
      },
      "body": {
        "font-family": "'Akrobat', system-ui, sans-serif !important",
        "font-weight": "400 !important",
        "font-size": "17px !important",
        "line-height": "1.3 !important",
        "text-align": "left !important",
        "hyphens": "none !important"
      },
      "p": {
        "text-align": "left !important",
        "hyphens": "none !important",
        "margin": "0 0 1.3em 0 !important",
        "text-indent": "0 !important"
      },
      "div": {
        "text-align": "left !important",
        "hyphens": "none !important"
      }
    });

    // Parse hash → { cfi, href, t }
    // Supports:
    //   #epubcfi(...)              → paragraph-level (E032+)
    //   #href=path&t=textfragment  → chapter + text-fragment scroll
    //   #href=path                 → chapter-level
    //   #p=N                       → PDF page (Phase 2)
    //   (empty)                    → book start
    function parseHash() {
      const h = window.location.hash.slice(1);
      if (!h) return { target: null, t: null };
      if (h.startsWith("epubcfi")) return { target: h, t: null };
      // Parse k=v pairs separated by &
      const out = {};
      h.split("&").forEach(part => {
        const eq = part.indexOf("=");
        if (eq < 0) return;
        out[part.slice(0, eq)] = decodeURIComponent(part.slice(eq + 1));
      });
      return { target: out.href || null, t: out.t || null };
    }

    // Highlight + scroll to first match of `text` inside current iframe.
    function locateText(text) {
      const iframe = document.querySelector("#viewer iframe");
      if (!iframe || !iframe.contentDocument) return false;
      const doc = iframe.contentDocument;
      const needle = text.toLowerCase().trim();
      if (!needle) return false;

      // Walk text nodes for the first occurrence.
      const walker = doc.createTreeWalker(doc.body, NodeFilter.SHOW_TEXT, null);
      let node;
      while ((node = walker.nextNode())) {
        const hay = node.nodeValue.toLowerCase();
        const idx = hay.indexOf(needle.slice(0, Math.min(needle.length, 40)));
        if (idx >= 0) {
          // Wrap match in a <mark> for yellow highlight.
          const range = doc.createRange();
          range.setStart(node, idx);
          range.setEnd(node, Math.min(node.nodeValue.length, idx + needle.length));
          const mark = doc.createElement("mark");
          mark.style.background = "#fff2a8";
          mark.style.padding = "0.1em 0";
          try {
            range.surroundContents(mark);
          } catch (e) {
            // Range spans multiple nodes — skip wrapping, just scroll.
          }
          mark.scrollIntoView({ block: "center", behavior: "instant" });
          return true;
        }
      }
      return false;
    }

    // Display book once ready
    const parsed = parseHash();
    book.opened.then(() => {
      return rendition.display(parsed.target || undefined);
    }).then(() => {
      if (parsed.t) {
        // Give epub.js a tick to lay out the iframe.
        setTimeout(() => locateText(parsed.t), 250);
      }
      console.log("[reader] displayed");
    }).catch((err) => {
      console.error("[reader] display failed:", err);
      document.getElementById("viewer").innerHTML =
        '<div style="padding:2rem;color:#900;font-family:monospace">' +
        'Reader error: ' + (err && err.message ? err.message : String(err)) +
        '</div>';
    });

    // Keyboard navigation — parent window AND iframe contents.
    // epub.js renders into an <iframe> which captures keystrokes when focused.
    function handleKey(e) {
      if (e.key === "ArrowLeft") rendition.prev();
      if (e.key === "ArrowRight") rendition.next();
    }
    document.addEventListener("keyup", handleKey);
    rendition.on("keyup", handleKey);

    // Edge clicks
    document.getElementById("prev").onclick = () => rendition.prev();
    document.getElementById("next").onclick = () => rendition.next();

    // Update hash as user navigates (so refresh returns to spot)
    rendition.on("relocated", (location) => {
      const cfi = location.start.cfi;
      history.replaceState(null, "", "#" + cfi);
    });
  </script>
</body>
</html>
